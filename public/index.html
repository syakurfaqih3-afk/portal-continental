<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Continental Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: #e5e7eb; }
        .card-custom { background-color: #1a1a1a; border: 1px solid #2d2d2d; transition: 0.3s; }
        .card-custom:hover { border-color: #4f46e5; background-color: #222; }
    </style>
</head>
<body class="font-sans">

    <header class="max-w-4xl mx-auto mt-10 px-6">
        <div class="flex items-center gap-2 text-gray-500 mb-6 text-sm font-mono">
            <span>$</span> <span>|</span> <span class="text-white">hotel-prices</span>
        </div>
        
        <div class="relative mb-8">
            <input type="text" id="searchInput" placeholder="Cari harga atau layanan..." 
                   class="w-full bg-[#121212] border border-[#2d2d2d] rounded-xl py-3 px-12 focus:outline-none focus:border-indigo-500">
            <div class="absolute left-4 top-3.5 text-gray-500">🔍</div>
        </div>

        <div class="flex gap-3 mb-10 overflow-x-auto pb-2" id="filterButtons">
            <button onclick="filterData('all')" class="bg-indigo-600 px-4 py-2 rounded-lg text-sm">All</button>
            <button onclick="filterData('casino')" class="border border-[#2d2d2d] px-4 py-2 rounded-lg text-sm hover:bg-[#2d2d2d]">Casino</button>
            <button onclick="filterData('hotel')" class="border border-[#2d2d2d] px-4 py-2 rounded-lg text-sm hover:bg-[#2d2d2d]">Hotel</button>
            <button onclick="filterData('restaurant')" class="border border-[#2d2d2d] px-4 py-2 rounded-lg text-sm hover:bg-[#2d2d2d]">Restaurant</button>
        </div>

        <div id="contentGrid" class="space-y-4">
            <p class="text-center text-gray-500">Memuat data...</p>
        </div>
    </header>

    <script>
        let allData = [];

        // 1. Fungsi ambil data dari Backend (server.js)
        async function fetchDatabase() {
            try {
                const response = await fetch('/api/server');
                allData = await response.json();
                renderCards(allData);
            } catch (err) {
                document.getElementById('contentGrid').innerHTML = `<p class="text-red-500 text-center">Gagal terhubung ke API</p>`;
            }
        }

        // 2. Fungsi nampilkan kartu ke layar
        function renderCards(items) {
            const grid = document.getElementById('contentGrid');
            if (items.length === 0) {
                grid.innerHTML = `<p class="text-center text-gray-500">Data tidak ditemukan.</p>`;
                return;
            }
            grid.innerHTML = items.map(item => `
                <div class="card-custom p-5 rounded-2xl">
                    <h3 class="text-gray-400 font-bold uppercase tracking-widest text-xs mb-1">${item.title}</h3>
                    <p class="text-yellow-500 font-medium text-sm mb-2">
                        ${item.author}: <span class="text-gray-300">${item.description}</span> 
                        <span class="bg-[#2d2d2d] text-gray-400 px-2 py-0.5 rounded italic ml-1 text-xs">${item.priceTag}</span>
                    </p>
                    <div class="flex items-center gap-4 text-[10px] text-gray-500 mt-4 uppercase">
                        <span>💬 0 Comments</span>
                        <span>• ${item.time}</span>
                    </div>
                </div>
            `).join('');
        }

        // 3. Fungsi Filter
        function filterData(category) {
            if (category === 'all') {
                renderCards(allData);
            } else {
                const filtered = allData.filter(item => item.category === category);
                renderCards(filtered);
            }
        }

        // 4. Fungsi Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allData.filter(item => 
                item.title.toLowerCase().includes(val) || 
                item.description.toLowerCase().includes(val)
            );
            renderCards(filtered);
        });

        // Jalankan saat start
        fetchDatabase();
    </script>
</body>
</html>
