<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Continental - Price List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .gradient-header {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b7a 100%);
            color: white;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .price-badge {
            font-weight: 700;
            font-size: 18px;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .price-casino { background: #e3f2fd; color: #1976d2; }
        .price-hotel { background: #e8f5e9; color: #388e3c; }
        .price-medical { background: #fce4ec; color: #c2185b; }
        .section-icon { font-size: 32px; }
        .detail-text { color: #666; font-size: 13px; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="gradient-header py-10 px-6 shadow-lg">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-4xl font-bold mb-2">🏨 THE CONTINENTAL PORTAL</h1>
            <p class="text-red-100 text-lg">Price List & Service Regulations</p>
        </div>
    </div>

    <main class="max-w-7xl mx-auto py-12 px-6">
        <!-- Filter Buttons -->
        <div class="flex gap-3 mb-10 justify-center flex-wrap">
            <button onclick="filterSection('all')" class="px-6 py-2 rounded-full font-bold text-white bg-gray-500 hover:bg-gray-600 transition">All Services</button>
            <button onclick="filterSection('casino')" class="px-6 py-2 rounded-full font-bold text-white bg-blue-500 hover:bg-blue-600 transition">🎰 Casino</button>
            <button onclick="filterSection('hotel')" class="px-6 py-2 rounded-full font-bold text-white bg-green-500 hover:bg-green-600 transition">🏨 Hotel</button>
            <button onclick="filterSection('medical')" class="px-6 py-2 rounded-full font-bold text-white bg-pink-500 hover:bg-pink-600 transition">⚕️ Medical</button>
        </div>

        <!-- Content Grid -->
        <div id="contentContainer" class="space-y-8"></div>
    </main>

    <script>
        let priceData = {};
        const colors = {
            casino: { bg: 'bg-blue-50', border: 'border-blue-500', badge: 'price-casino', icon: '🎰' },
            hotel: { bg: 'bg-green-50', border: 'border-green-500', badge: 'price-hotel', icon: '🏨' },
            medical: { bg: 'bg-pink-50', border: 'border-pink-500', badge: 'price-medical', icon: '⚕️' }
        };

        async function loadData() {
            try {
                const res = await fetch('/api/server');
                priceData = await res.json();
                renderAll();
            } catch (e) { 
                console.error("Error loading API", e);
                renderStaticData();
            }
        }

        function renderStaticData() {
            // Fallback data jika API error
            priceData = {
                casino: { section: "CASINO SERVICES", items: [] },
                hotel: { section: "HOTEL ACCOMMODATIONS", items: [] },
                medical: { section: "MEDICAL SERVICES", items: [] }
            };
        }

        function renderAll() {
            filterSection('all');
        }

        function filterSection(section) {
            const container = document.getElementById('contentContainer');
            container.innerHTML = '';

            const sections = section === 'all' ? ['casino', 'hotel', 'medical'] : [section];

            sections.forEach(sec => {
                if (priceData[sec]) {
                    const color = colors[sec];
                    const data = priceData[sec];
                    
                    const html = `
                        <div class="section-container">
                            <div class="flex items-center gap-3 mb-6">
                                <span class="section-icon">${color.icon}</span>
                                <h2 class="text-3xl font-bold text-gray-800">${data.section}</h2>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                ${data.items.map(item => `
                                    <div class="${color.bg} border-l-4 ${color.border} p-6 rounded-lg card-hover shadow-md">
                                        <div class="flex justify-between items-start mb-3">
                                            <div class="flex-1">
                                                <h3 class="font-bold text-gray-800 text-base mb-1">${item.title}</h3>
                                                <p class="text-gray-600 text-sm">${item.description}</p>
                                            </div>
                                        </div>
                                        <div class="mb-3">
                                            <span class="price-badge ${color.badge}">${item.price}</span>
                                        </div>
                                        <p class="detail-text">${item.details}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    container.innerHTML += html;
                }
            });
        }

        loadData();
    </script>
</body>
</html>

    <script>
        // Close button functionality
        document.querySelector('button:nth-of-type(1)').addEventListener('click', function() {
            alert('Terima kasih');
        });

        // Confirm button functionality
        document.querySelector('button:nth-of-type(2)').addEventListener('click', function() {
            alert('Regulasi telah dikonfirmasi');
        });

        // Top card click handlers
        document.querySelectorAll('.grid.grid-cols-1.md\\:grid-cols-3 > div').forEach((card, index) => {
            card.addEventListener('click', function() {
                const titles = ['Cash Payment', 'Invoice Payment', 'Price Update'];
                alert('Anda memilih: ' + titles[index]);
            });
        });
    </script>
</body>
</html>
